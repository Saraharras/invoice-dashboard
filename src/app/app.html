<div class="container">
  <h1>Gestion des Factures</h1>
  
  <!-- KPI Section -->
  <div class="kpi-container">
    <div class="kpi-card">
      <div class="kpi-title">Total Factures</div>
      <div class="kpi-value">{{ totalInvoices }}</div>
    </div>
    
    <div class="kpi-card">
      <div class="kpi-title">Anomalies</div>
      <div class="kpi-value anomaly-count">{{ totalAnomalies }}</div>
    </div>
  </div>

  <!-- Tableau -->
  <div class="table-container">
    <h2>Liste des Factures</h2>
    <table>
      <thead>
        <tr>
          <th>Invoice ID</th>
          <th>Supplier</th>
          <th>Amount</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let invoice of invoices">
          <td>{{ invoice.invoice_id }}</td>
          <td>{{ invoice.supplier }}</td>
          <td>{{ invoice.amount | number:'1.0-0' }} </td>
          <td>
            <span class="status-badge" 
                  [class.status-ok]="invoice.status === 'OK'" 
                  [class.status-warning]="invoice.status === 'WARNING'" 
                  [class.status-anomaly]="invoice.status === 'ANOMALY'">
              {{ invoice.status }}
            </span>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
